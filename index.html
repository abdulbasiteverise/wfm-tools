<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WFM AI Tools</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg,#020617,#0f172a);
  color:white;
}

header {
  text-align:center;
  padding:40px 20px;
}

h1 {
  font-size:32px;
  color:#38bdf8;
}

.sub {
  color:#94a3b8;
}

.container {
  max-width:1200px;
  margin:auto;
  padding:20px;
}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:25px;
}

.card {
  background:rgba(30,41,59,0.8);
  backdrop-filter:blur(10px);
  padding:25px;
  border-radius:16px;
  transition:0.3s;
  border:1px solid rgba(255,255,255,0.1);
}

.card:hover {
  transform:translateY(-8px);
  box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

a { text-decoration:none; color:white; }

.title {
  font-size:20px;
  color:#22c55e;
}

.desc {
  margin-top:10px;
  font-size:14px;
  color:#cbd5e1;
}
</style>
</head>

<body>

<header>
  <h1>🚀 WFM AI Platform</h1>
  <p class="sub">Smart Workforce Management Tools & Insights</p>
</header>

<div class="container">
  <div class="grid">

    <a href="capacity.html">
      <div class="card">
        <div class="title">📊 Capacity Planner</div>
        <div class="desc">FTE calculation with shrinkage & occupancy</div>
      </div>
    </a>

    <a href="erlang.html">
      <div class="card">
        <div class="title">📞 Erlang C Calculator</div>
        <div class="desc">Staffing based on SLA & queueing theory</div>
      </div>
    </a>

  </div>
</div>

</body>
</html>
