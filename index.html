<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>WFM AI Tools</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
    }

    header {
      padding: 20px;
      text-align: center;
      background: #020617;
      border-bottom: 1px solid #334155;
    }

    h1 {
      color: #38bdf8;
      margin: 0;
    }

    .container {
      padding: 20px;
      max-width: 1100px;
      margin: auto;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      transition: 0.3s;
      cursor: pointer;
    }

    .card:hover {
      transform: scale(1.05);
      background: #334155;
    }

    a {
      text-decoration: none;
      color: white;
    }

    .title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 10px;
      color: #22c55e;
    }

    .desc {
      font-size: 14px;
      color: #cbd5f5;
    }
  </style>
</head>

<body>

<header>
  <h1>🚀 WFM AI Tools Platform</h1>
  <p>Smart Workforce Management Calculators & Insights</p>
</header>

<div class="container">

  <div class="grid">

    <a href="capacity.html">
      <div class="card">
        <div class="title">📊 Capacity Planner</div>
        <div class="desc">Calculate FTE using Volume, AHT, Shrinkage & Occupancy</div>
      </div>
    </a>

    <a href="erlang.html">
      <div class="card">
        <div class="title">📞 Erlang C Calculator</div>
        <div class="desc">Staffing based on SLA, AHT, and volume</div>
      </div>
    </a>

    <a href="shrinkage.html">
      <div class="card">
        <div class="title">📉 Shrinkage Planner</div>
        <div class="desc">Plan shrinkage impact on staffing</div>
      </div>
    </a>

  </div>

</div>

</body>
</html>
