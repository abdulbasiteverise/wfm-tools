<!DOCTYPE html>
<html>
<head>
<title>Erlang C Advanced</title>
</head>

<body style="background:#0f172a;color:white;padding:20px;font-family:sans-serif;">

<h2>📞 Erlang C (Real SLA)</h2>

<input id="calls" placeholder="Calls per hour"><br>
<input id="aht" placeholder="AHT seconds"><br>
<input id="agents" placeholder="Agents"><br>
<input id="target" placeholder="Target answer time (sec)"><br>

<button onclick="calc()">Calculate SLA</button>

<h3 id="out"></h3>

<script>
function fact(n){
 let f=1;
 for(let i=1;i<=n;i++) f*=i;
 return f;
}

function erlangC(A,N){
 let sum=0;
 for(let i=0;i<N;i++){
   sum+=Math.pow(A,i)/fact(i);
 }

 let last=(Math.pow(A,N)/fact(N))*(N/(N-A));
 return last/(sum+last);
}

function calc(){
 let calls=+calls.value;
 let aht=+aht.value;
 let agents=+agents.value;
 let t=+target.value;

 let A=(calls*aht)/3600;

 let ec=erlangC(A,agents);

 let sl=1 - ec*Math.exp(-(agents-A)*(t/aht));

 document.getElementById("out").innerHTML=
   "Traffic: "+A.toFixed(2)+"<br>SLA: "+(sl*100).toFixed(2)+"%";
}
</script>

</body>
</html>
