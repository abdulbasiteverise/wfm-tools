<!DOCTYPE html>
<html>
<head>
<title>WFM AI Capacity Tool</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background:#020617;
  color:white;
  padding:20px;
}

.container {
  max-width:1000px;
  margin:auto;
}

.card {
  background:#1e293b;
  padding:20px;
  border-radius:12px;
  margin-bottom:20px;
}

input {
  padding:10px;
  width:100%;
  margin:5px 0;
  background:#020617;
  border:1px solid #334155;
  color:white;
}

button {
  padding:12px;
  width:100%;
  background:#38bdf8;
  border:none;
  border-radius:8px;
  font-weight:bold;
}

.ai {
  background:#020617;
  padding:15px;
  margin-top:10px;
  border-left:4px solid #22c55e;
}
</style>

</head>

<body>

<div class="container">

<h2>🚀 WFM AI Capacity Tool</h2>

<div class="card">
<h3>Manual Input</h3>

<input id="vol" placeholder="Volume">
<input id="aht" placeholder="AHT">
<input id="shr" placeholder="Shrinkage %">
<input id="occ" placeholder="Occupancy %">

<button onclick="calc()">Calculate</button>
</div>

<div class="card">
<h3>📂 Upload CSV (Volume per hour)</h3>
<input type="file" id="file">
<button onclick="processFile()">Analyze File</button>
</div>

<div class="card" id="output"></div>
<div class="ai" id="ai"></div>

</div>

<script>
function calc(){
 let v=+vol.value, a=+aht.value, s=+shr.value, o=+occ.value;

 let wl=(v*a)/3600;
 let fte=wl/((1-s/100)*(o/100));

 showResult(wl, Math.ceil(fte), s, o);
}

function processFile(){
 let file=document.getElementById("file").files[0];
 let reader=new FileReader();

 reader.onload=function(e){
   let rows=e.target.result.split("\n");
   let total=0;

   rows.forEach(r=>{
     let val=parseInt(r);
     if(!isNaN(val)) total+=val;
   });

   let avg=total/rows.length;

   let wl=(avg*300)/3600; // assume 300 AHT
   let fte=Math.ceil(wl/0.7);

   showResult(wl, fte, 30, 85);
 }

 reader.readAsText(file);
}

function showResult(wl, fte, s, o){

 document.getElementById("output").innerHTML=
   "Workload: "+wl.toFixed(2)+" hrs<br>FTE: "+fte;

 let insight="";

 if(o>85) insight+="⚠️ High occupancy risk<br>";
 if(s>35) insight+="⚠️ High shrinkage<br>";
 if(fte<wl) insight+="⚠️ Understaffed<br>";

 if(insight==="") insight="✅ Balanced plan";

 document.getElementById("ai").innerHTML="<b>AI Insight:</b><br>"+insight;
}
</script>

</body>
</html>
